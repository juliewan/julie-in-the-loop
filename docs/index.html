  /* ── centered wordmark, wave animation ─────────────────── */
  .wordmark {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: flex-start;    /* sit high — around the top third   */
    justify-content: center;
    padding: 18vh 24px 24px;
    padding-right: calc(24px + var(--nav-width));  /* center left of the sidebar */
    z-index: 5;                 /* below sidebar (15) + topbar (20) */
    pointer-events: none;       /* clicks pass through to links     */
  }

  .wordmark pre {
    margin: 0;
    font-family: 'Courier New', Courier, monospace;
    font-size: clamp(5px, 1.45vw, 13px);
    line-height: 1.05;
    color: #b98a86;
    white-space: pre;
  }

  .wordmark .wv {
    display: inline-block;
    transform-origin: bottom center;   /* squash/stretch stands on the floor */
    /* one full cycle = time for the hop to cross the width + a rest gap */
    animation: wordmark-hop 5.2s linear infinite;
    animation-delay: var(--d, 0s);
    will-change: transform;
  }

  /* pixar-lamp hop: crouch (anticipation) → big launch, stretched → smack
     the floor, squashed → a couple of decaying bounces → settle → long rest.
     the per-column delay marches this hop left → right, stadium-wave style.
     per-keyframe easing fakes gravity: decelerate on the way up, accelerate
     on the way down. */
  @keyframes wordmark-hop {
    0%    { transform: translateY(0)       scale(1, 1);      animation-timing-function: ease-in;  }
    1.8%  { transform: translateY(0.1em)   scale(1.16, 0.7); animation-timing-function: ease-out; } /* anticipation crouch */
    5.3%  { transform: translateY(-1.1em)  scale(0.9, 1.16); animation-timing-function: ease-in;  } /* launch → apex, stretched */
    9%    { transform: translateY(0)       scale(1.18, 0.72);animation-timing-function: ease-out; } /* hit the floor, squash */
    11%   { transform: translateY(-0.34em) scale(0.97, 1.06);animation-timing-function: ease-in;  } /* bounce back up */
    12.8% { transform: translateY(0)       scale(1.08, 0.86);animation-timing-function: ease-out; } /* land, small squash */
    14%   { transform: translateY(-0.1em)  scale(1, 1.02);   animation-timing-function: ease-in;  } /* last little hop */
    15%   { transform: translateY(0)       scale(1, 1); }                                           /* settle */
    100%  { transform: translateY(0)       scale(1, 1); }                                           /* rest until the wave loops */
  }

  @media (prefers-reduced-motion: reduce) {
    .wordmark .wv { animation: none; }
  }

<script>
(() => {
  "use strict";
  const ART = String.raw`
          ▄▄                                                    ▄▄
           ██                              █▄ █▄                 ██
  ▀▀       ██ ▀▀            ▀▀ ▄          ▄██▄██                 ██
  ██ ██ ██ ██ ██ ▄█▀█▄      ██ ████▄       ██ ████▄ ▄█▀█▄        ██ ▄███▄ ▄███▄ ████▄
  ██ ██ ██ ██ ██ ██▄█▀ ▀▀▀▀ ██ ██ ██ ▀▀▀▀  ██ ██ ██ ██▄█▀ ▀▀▀▀   ██ ██ ██ ██ ██ ██ ██
 ▄██▄▀██▀█▄██▄██▄▀█▄▄▄     ▄██▄██ ▀█      ▄██▄██ ██▄▀█▄▄▄       ▄██▄▀███▀▄▀███▀▄████▀
  ██                                                                            ██
▀▀▀                                                                             ▀    `;

  const STEP = 0.045;                // seconds of delay per column → the hop's travel speed
  const pre = document.getElementById("wordmark-art");
  const lines = ART.replace(/^\n/, "").split("\n");

  for (const line of lines) {
    const row = document.createDocumentFragment();
    [...line].forEach((ch, col) => {
      if (ch === " ") {              // spaces just hold the grid, no need to animate
        row.appendChild(document.createTextNode(" "));
        return;
      }
      const span = document.createElement("span");
      span.className = "wv";
      span.textContent = ch;
      // positive, growing delay → each column hops a beat later than the one
      // to its left, so the crest sweeps left → right
      span.style.setProperty("--d", `${(col * STEP).toFixed(2)}s`);
      row.appendChild(span);
    });
    pre.appendChild(row);
    pre.appendChild(document.createTextNode("\n"));
  }
})();
</script>
